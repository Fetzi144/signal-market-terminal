services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: smt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smt}
      POSTGRES_DB: smt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smt"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - smt-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command:
      - gunicorn
      - app.main:app
      - -w
      - "1"
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --timeout
      - "120"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smt:${DB_PASSWORD:-smt}@db:5432/smt
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - RUN_MIGRATIONS=true
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - KALSHI_ENABLED=${KALSHI_ENABLED:-false}
      - SCHEDULER_ENABLED=false
    volumes:
      - ./docs:/docs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/', timeout=5); r.raise_for_status()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - smt-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://smt:${DB_PASSWORD:-smt}@db:5432/smt
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - RUN_MIGRATIONS=false
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - KALSHI_ENABLED=${KALSHI_ENABLED:-false}
      - SCHEDULER_ENABLED=true
    volumes:
      - ./docs:/docs
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
    networks:
      - smt-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
      - worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - smt-net

volumes:
  pgdata:

networks:
  smt-net:
    driver: bridge

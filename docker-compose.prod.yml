services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: smt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smt}
      POSTGRES_DB: smt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smt"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - smt-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command:
      - gunicorn
      - app.main:app
      - -w
      - "1"
      - -k
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --timeout
      - "120"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smt:${DB_PASSWORD:-smt}@db:5432/smt
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - RUN_MIGRATIONS=true
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - SNAPSHOT_PRICE_HEARTBEAT_SECONDS=${SNAPSHOT_PRICE_HEARTBEAT_SECONDS:-900}
      - SNAPSHOT_PRICE_CHANGE_EPSILON=${SNAPSHOT_PRICE_CHANGE_EPSILON:-0.000001}
      - SNAPSHOT_VOLUME_LIQUIDITY_CHANGE_RATIO=${SNAPSHOT_VOLUME_LIQUIDITY_CHANGE_RATIO:-0.25}
      - KALSHI_SNAPSHOT_FULL_UNIVERSE_ENABLED=${KALSHI_SNAPSHOT_FULL_UNIVERSE_ENABLED:-false}
      - KALSHI_SNAPSHOT_MAX_ACTIVE_OUTCOMES=${KALSHI_SNAPSHOT_MAX_ACTIVE_OUTCOMES:-5000}
      - KALSHI_SNAPSHOT_MAX_MARKET_HORIZON_DAYS=${KALSHI_SNAPSHOT_MAX_MARKET_HORIZON_DAYS:-45}
      - RETENTION_PRICE_SNAPSHOTS_DAYS=${RETENTION_PRICE_SNAPSHOTS_DAYS:-3}
      - RETENTION_ORDERBOOK_SNAPSHOTS_DAYS=${RETENTION_ORDERBOOK_SNAPSHOTS_DAYS:-7}
      - RETENTION_SIGNALS_DAYS=${RETENTION_SIGNALS_DAYS:-45}
      - KALSHI_ENABLED=${KALSHI_ENABLED:-true}
      - KALSHI_RESOLUTION_BACKFILL_ENABLED=${KALSHI_RESOLUTION_BACKFILL_ENABLED:-true}
      - PAPER_TRADING_ORDERBOOK_CONTEXT_FINALIZATION_GRACE_SECONDS=${PAPER_TRADING_ORDERBOOK_CONTEXT_FINALIZATION_GRACE_SECONDS:-120}
      - PAPER_TRADING_PROFITABILITY_FILTER_ENABLED=${PAPER_TRADING_PROFITABILITY_FILTER_ENABLED:-true}
      - PAPER_TRADING_MAX_RESOLUTION_HORIZON_DAYS=${PAPER_TRADING_MAX_RESOLUTION_HORIZON_DAYS:-30}
      - PAPER_TRADING_MIN_MARKET_LIQUIDITY_USD=${PAPER_TRADING_MIN_MARKET_LIQUIDITY_USD:-500}
      - PAPER_TRADING_REQUIRE_MARKET_END_DATE=${PAPER_TRADING_REQUIRE_MARKET_END_DATE:-true}
      - POLYMARKET_LIVE_TRADING_ENABLED=${POLYMARKET_LIVE_TRADING_ENABLED:-false}
      - POLYMARKET_LIVE_DRY_RUN=${POLYMARKET_LIVE_DRY_RUN:-true}
      - POLYMARKET_LIVE_MANUAL_APPROVAL_REQUIRED=${POLYMARKET_LIVE_MANUAL_APPROVAL_REQUIRED:-true}
      - POLYMARKET_PILOT_ENABLED=${POLYMARKET_PILOT_ENABLED:-false}
      - POLYMARKET_PILOT_REQUIRE_MANUAL_APPROVAL=${POLYMARKET_PILOT_REQUIRE_MANUAL_APPROVAL:-true}
      - POLYMARKET_EXECUTION_POLICY_ENABLED=${POLYMARKET_EXECUTION_POLICY_ENABLED:-false}
      - POLYMARKET_STREAM_ENABLED=${POLYMARKET_STREAM_ENABLED:-false}
      - POLYMARKET_META_SYNC_ENABLED=${POLYMARKET_META_SYNC_ENABLED:-false}
      - POLYMARKET_RAW_STORAGE_ENABLED=${POLYMARKET_RAW_STORAGE_ENABLED:-false}
      - POLYMARKET_TRADE_BACKFILL_ENABLED=${POLYMARKET_TRADE_BACKFILL_ENABLED:-false}
      - POLYMARKET_OI_POLL_ENABLED=${POLYMARKET_OI_POLL_ENABLED:-false}
      - POLYMARKET_BOOK_RECON_ENABLED=${POLYMARKET_BOOK_RECON_ENABLED:-false}
      - POLYMARKET_BOOK_RECON_BBO_TOLERANCE=${POLYMARKET_BOOK_RECON_BBO_TOLERANCE:-0.01}
      - POLYMARKET_BOOK_RECON_RESYNC_COOLDOWN_SECONDS=${POLYMARKET_BOOK_RECON_RESYNC_COOLDOWN_SECONDS:-300}
      - POLYMARKET_BOOK_SNAPSHOT_INTERVAL_SECONDS=${POLYMARKET_BOOK_SNAPSHOT_INTERVAL_SECONDS:-300}
      - POLYMARKET_TRADE_BACKFILL_INTERVAL_SECONDS=${POLYMARKET_TRADE_BACKFILL_INTERVAL_SECONDS:-900}
      - POLYMARKET_OI_POLL_INTERVAL_SECONDS=${POLYMARKET_OI_POLL_INTERVAL_SECONDS:-900}
      - POLYMARKET_SNAPSHOT_MAX_WATCHED_ASSETS=${POLYMARKET_SNAPSHOT_MAX_WATCHED_ASSETS:-50}
      - POLYMARKET_BOOK_RECON_MAX_WATCHED_ASSETS=${POLYMARKET_BOOK_RECON_MAX_WATCHED_ASSETS:-50}
      - POLYMARKET_FEE_HISTORY_ENABLED=${POLYMARKET_FEE_HISTORY_ENABLED:-false}
      - POLYMARKET_REPLAY_ENABLED=${POLYMARKET_REPLAY_ENABLED:-false}
      - POLYMARKET_REPLAY_ON_STARTUP=${POLYMARKET_REPLAY_ON_STARTUP:-false}
      - POLYMARKET_STRUCTURE_ENGINE_ENABLED=${POLYMARKET_STRUCTURE_ENGINE_ENABLED:-false}
      - POLYMARKET_STRUCTURE_INCLUDE_CROSS_VENUE=${POLYMARKET_STRUCTURE_INCLUDE_CROSS_VENUE:-false}
      - POLYMARKET_STRUCTURE_PAPER_ROUTING_ENABLED=${POLYMARKET_STRUCTURE_PAPER_ROUTING_ENABLED:-false}
      - POLYMARKET_STRUCTURE_PAPER_REQUIRE_MANUAL_APPROVAL=${POLYMARKET_STRUCTURE_PAPER_REQUIRE_MANUAL_APPROVAL:-true}
      - DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_ENABLED=${DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_ENABLED:-true}
      - DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_INTERVAL_SECONDS=${DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_INTERVAL_SECONDS:-900}
      - SCHEDULER_ENABLED=false
    volumes:
      - ./docs:/docs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/', timeout=5); r.raise_for_status()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - smt-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://smt:${DB_PASSWORD:-smt}@db:5432/smt
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - RUN_MIGRATIONS=false
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-}
      - API_KEY=${API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - SNAPSHOT_PRICE_HEARTBEAT_SECONDS=${SNAPSHOT_PRICE_HEARTBEAT_SECONDS:-900}
      - SNAPSHOT_PRICE_CHANGE_EPSILON=${SNAPSHOT_PRICE_CHANGE_EPSILON:-0.000001}
      - SNAPSHOT_VOLUME_LIQUIDITY_CHANGE_RATIO=${SNAPSHOT_VOLUME_LIQUIDITY_CHANGE_RATIO:-0.25}
      - KALSHI_SNAPSHOT_FULL_UNIVERSE_ENABLED=${KALSHI_SNAPSHOT_FULL_UNIVERSE_ENABLED:-false}
      - KALSHI_SNAPSHOT_MAX_ACTIVE_OUTCOMES=${KALSHI_SNAPSHOT_MAX_ACTIVE_OUTCOMES:-5000}
      - KALSHI_SNAPSHOT_MAX_MARKET_HORIZON_DAYS=${KALSHI_SNAPSHOT_MAX_MARKET_HORIZON_DAYS:-45}
      - RETENTION_PRICE_SNAPSHOTS_DAYS=${RETENTION_PRICE_SNAPSHOTS_DAYS:-3}
      - RETENTION_ORDERBOOK_SNAPSHOTS_DAYS=${RETENTION_ORDERBOOK_SNAPSHOTS_DAYS:-7}
      - RETENTION_SIGNALS_DAYS=${RETENTION_SIGNALS_DAYS:-45}
      - KALSHI_ENABLED=${KALSHI_ENABLED:-true}
      - KALSHI_RESOLUTION_BACKFILL_ENABLED=${KALSHI_RESOLUTION_BACKFILL_ENABLED:-true}
      - PAPER_TRADING_ORDERBOOK_CONTEXT_FINALIZATION_GRACE_SECONDS=${PAPER_TRADING_ORDERBOOK_CONTEXT_FINALIZATION_GRACE_SECONDS:-120}
      - PAPER_TRADING_PROFITABILITY_FILTER_ENABLED=${PAPER_TRADING_PROFITABILITY_FILTER_ENABLED:-true}
      - PAPER_TRADING_MAX_RESOLUTION_HORIZON_DAYS=${PAPER_TRADING_MAX_RESOLUTION_HORIZON_DAYS:-30}
      - PAPER_TRADING_MIN_MARKET_LIQUIDITY_USD=${PAPER_TRADING_MIN_MARKET_LIQUIDITY_USD:-500}
      - PAPER_TRADING_REQUIRE_MARKET_END_DATE=${PAPER_TRADING_REQUIRE_MARKET_END_DATE:-true}
      - POLYMARKET_LIVE_TRADING_ENABLED=${POLYMARKET_LIVE_TRADING_ENABLED:-false}
      - POLYMARKET_LIVE_DRY_RUN=${POLYMARKET_LIVE_DRY_RUN:-true}
      - POLYMARKET_LIVE_MANUAL_APPROVAL_REQUIRED=${POLYMARKET_LIVE_MANUAL_APPROVAL_REQUIRED:-true}
      - POLYMARKET_PILOT_ENABLED=${POLYMARKET_PILOT_ENABLED:-false}
      - POLYMARKET_PILOT_REQUIRE_MANUAL_APPROVAL=${POLYMARKET_PILOT_REQUIRE_MANUAL_APPROVAL:-true}
      - POLYMARKET_EXECUTION_POLICY_ENABLED=${POLYMARKET_EXECUTION_POLICY_ENABLED:-false}
      - POLYMARKET_STREAM_ENABLED=${POLYMARKET_STREAM_ENABLED:-false}
      - POLYMARKET_META_SYNC_ENABLED=${POLYMARKET_META_SYNC_ENABLED:-false}
      - POLYMARKET_RAW_STORAGE_ENABLED=${POLYMARKET_RAW_STORAGE_ENABLED:-false}
      - POLYMARKET_TRADE_BACKFILL_ENABLED=${POLYMARKET_TRADE_BACKFILL_ENABLED:-false}
      - POLYMARKET_OI_POLL_ENABLED=${POLYMARKET_OI_POLL_ENABLED:-false}
      - POLYMARKET_BOOK_RECON_ENABLED=${POLYMARKET_BOOK_RECON_ENABLED:-false}
      - POLYMARKET_BOOK_RECON_BBO_TOLERANCE=${POLYMARKET_BOOK_RECON_BBO_TOLERANCE:-0.01}
      - POLYMARKET_BOOK_RECON_RESYNC_COOLDOWN_SECONDS=${POLYMARKET_BOOK_RECON_RESYNC_COOLDOWN_SECONDS:-300}
      - POLYMARKET_BOOK_SNAPSHOT_INTERVAL_SECONDS=${POLYMARKET_BOOK_SNAPSHOT_INTERVAL_SECONDS:-300}
      - POLYMARKET_TRADE_BACKFILL_INTERVAL_SECONDS=${POLYMARKET_TRADE_BACKFILL_INTERVAL_SECONDS:-900}
      - POLYMARKET_OI_POLL_INTERVAL_SECONDS=${POLYMARKET_OI_POLL_INTERVAL_SECONDS:-900}
      - POLYMARKET_SNAPSHOT_MAX_WATCHED_ASSETS=${POLYMARKET_SNAPSHOT_MAX_WATCHED_ASSETS:-50}
      - POLYMARKET_BOOK_RECON_MAX_WATCHED_ASSETS=${POLYMARKET_BOOK_RECON_MAX_WATCHED_ASSETS:-50}
      - POLYMARKET_FEE_HISTORY_ENABLED=${POLYMARKET_FEE_HISTORY_ENABLED:-false}
      - POLYMARKET_REPLAY_ENABLED=${POLYMARKET_REPLAY_ENABLED:-false}
      - POLYMARKET_REPLAY_ON_STARTUP=${POLYMARKET_REPLAY_ON_STARTUP:-false}
      - POLYMARKET_STRUCTURE_ENGINE_ENABLED=${POLYMARKET_STRUCTURE_ENGINE_ENABLED:-false}
      - POLYMARKET_STRUCTURE_INCLUDE_CROSS_VENUE=${POLYMARKET_STRUCTURE_INCLUDE_CROSS_VENUE:-false}
      - POLYMARKET_STRUCTURE_PAPER_ROUTING_ENABLED=${POLYMARKET_STRUCTURE_PAPER_ROUTING_ENABLED:-false}
      - POLYMARKET_STRUCTURE_PAPER_REQUIRE_MANUAL_APPROVAL=${POLYMARKET_STRUCTURE_PAPER_REQUIRE_MANUAL_APPROVAL:-true}
      - DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_ENABLED=${DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_ENABLED:-true}
      - DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_INTERVAL_SECONDS=${DEFAULT_STRATEGY_REVIEW_AUTO_GENERATE_INTERVAL_SECONDS:-900}
      - SCHEDULER_ENABLED=true
    volumes:
      - ./docs:/docs
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
    networks:
      - smt-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
      - worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - smt-net

volumes:
  pgdata:

networks:
  smt-net:
    driver: bridge
